name: Deploy Preview

on:
  push:
    branches:
      - main
      - master
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "wolfie-preview"
  cancel-in-progress: true

jobs:
  build-deploy:
    name: Build and Deploy Preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: pm
        shell: bash
        run: |
          cd apps/web
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=pnpm build" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "build=yarn build" >> "$GITHUB_OUTPUT"
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "build=npm run build" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find a supported lockfile in apps/web."
            exit 1
          fi

      - name: Setup pnpm
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.pm.outputs.manager }}
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: ${{ steps.pm.outputs.install }}

      - name: Build app
        working-directory: apps/web
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
        run: ${{ steps.pm.outputs.build }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Detect build output directory
        id: build_output
        shell: bash
        run: |
          cd apps/web
          if [ -d dist ]; then
            echo "dir=apps/web/dist" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then
            echo "dir=apps/web/build" >> "$GITHUB_OUTPUT"
          elif [ -d out ]; then
            echo "dir=apps/web/out" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find static build output directory. Expected dist, build, or out."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.build_output.outputs.dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        shell: bash
        run: |
          echo "## Wolfie Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview URL: ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
